{% extends "base.html" %}
{% block title %}Create User{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fa fa-user-plus me-2 text-clay"></i>Create User Account</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin_create_user') }}">
          <div class="mb-3">
            <label class="form-label">Full Name *</label>
            <input type="text" name="full_name" class="form-control"
                   value="{{ fd.get('full_name','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address *</label>
            <input type="email" name="email" class="form-control"
                   value="{{ fd.get('email','') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Role *</label>
            <select name="role" class="form-select" required>
              {% for r in ['admin','fundraiser','donee'] %}
              <option value="{{ r }}" {% if fd.get('role','donee') == r %}selected{% endif %}>
                {{ r|title }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control"
                   required placeholder="Min. 6 characters">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fa fa-save me-1"></i>Create Account
            </button>
            <a href="{{ url_for('admin_users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
