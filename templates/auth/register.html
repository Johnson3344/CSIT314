<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TACOFundMe — Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 auth-card mx-auto" style="max-width:480px;">
        <div class="text-center mb-4">
          <div class="auth-logo">🌮 TACO<span>FundMe</span></div>
          <p class="text-muted-warm mt-1">Create your account</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <div class="card">
          <div class="card-body p-4">
            <h4 class="mb-3 text-bark">Join TACOFundMe</h4>
            <form method="POST" action="{{ url_for('register') }}">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control"
                       value="{{ full_name or '' }}" required
                       placeholder="Your full name">
              </div>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control"
                       value="{{ email or '' }}" required
                       placeholder="you@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label">I want to join as a…</label>
                <div class="d-flex gap-3">
                  <div class="form-check flex-fill border rounded p-3
                       {% if (role or 'donee') == 'donee' %}border-success bg-light{% endif %}">
                    <input class="form-check-input" type="radio" name="role"
                           value="donee" id="roleDonee"
                           {% if (role or 'donee') == 'donee' %}checked{% endif %}>
                    <label class="form-check-label" for="roleDonee">
                      <strong>Donee</strong><br>
                      <small class="text-muted">Browse &amp; donate to campaigns</small>
                    </label>
                  </div>
                  <div class="form-check flex-fill border rounded p-3
                       {% if role == 'fundraiser' %}border-success bg-light{% endif %}">
                    <input class="form-check-input" type="radio" name="role"
                           value="fundraiser" id="roleFR"
                           {% if role == 'fundraiser' %}checked{% endif %}>
                    <label class="form-check-label" for="roleFR">
                      <strong>Fundraiser</strong><br>
                      <small class="text-muted">Create &amp; manage fundraising campaigns</small>
                    </label>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       required placeholder="Min. 6 characters">
              </div>
              <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control"
                       required placeholder="Repeat password">
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="fa fa-user-plus me-2"></i>Create Account
              </button>
            </form>
          </div>
        </div>

        <p class="text-center mt-3 text-muted-warm">
          Already have an account?
          <a href="{{ url_for('login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
